name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable

      - run: yarn install --immutable

      - run: yarn lint

      - run: yarn test

      - run: yarn build

      - run: yarn check:publint

      - run: yarn check:exports
